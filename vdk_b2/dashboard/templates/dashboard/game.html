{% load static %}
<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wave Shooter</title>
    <link rel="stylesheet" href="{% static 'dashboard/game.css' %}">
</head>
<body>
    <main class="game-page">
        <section id="gw" aria-label="Wave Shooter">
            <h1>Wave Shooter</h1>
            <div id="hud">
                <div class="hud-hp">
                    <span class="hud-muted">HP</span>
                    <div id="hpbar"><div id="hpfill"></div></div>
                    <span class="hud-val" id="hptxt">100</span>
                </div>
                <span class="hud-val" id="wavetxt">Sóng 1</span>
                <span class="hud-score" id="sctxt">0 điểm</span>
            </div>

            <div class="canvas-wrap">
                <canvas id="cv" width="640" height="320"></canvas>
                <div id="pauseMenu" class="pause-menu hidden">
                    <p>Menu game</p>
                    <button type="button" class="active" data-menu-action="continue">Tiếp tục chơi</button>
                    <button type="button" data-menu-action="dashboard">Trở về dashboard</button>
                </div>
            </div>

            <div id="info">WASD / mũi tên di chuyển · SPACE / J / OK tấn công · M mở menu · R chơi lại</div>
            <div id="ctrls">
                <div class="dpad">
                    <div class="drow"><button class="btn" id="bU" type="button" aria-label="lên">▲</button></div>
                    <div class="drow">
                        <button class="btn" id="bL" type="button" aria-label="trái">◀</button>
                        <button class="btn" id="bD" type="button" aria-label="xuống">▼</button>
                        <button class="btn" id="bR" type="button" aria-label="phải">▶</button>
                    </div>
                </div>
                <div class="action-pad">
                    <button class="btn menu-btn" id="bM" type="button" aria-label="menu">☰</button>
                    <button class="btn batk" id="bA" type="button" aria-label="tấn công">⚔</button>
                </div>
            </div>
        </section>
    </main>

    <script src="{% static 'dashboard/game.js' %}"></script>
</body>
</html>
